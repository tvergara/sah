# @package _global_

defaults:
  - override /algorithm: distil_on_meta_math
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  accumulate_grad_batches: 4
  precision: "bf16-mixed"
  callbacks:
    model_checkpoint:
      save_top_k: -1
      save_last: true
      every_n_train_steps: 1000
      filename: "checkpoint-step-{step}"
    throughput: null
  strategy: auto
  devices: 1
  accelerator: gpu

name: distil-on-meta-math
ckpt_path: last
