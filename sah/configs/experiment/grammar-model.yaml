# @package _global_

defaults:
  - override /algorithm: train_grammar_model
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  callbacks:
    model_checkpoint:
      every_n_train_steps: 100

name: grammar
ckpt_path: last
