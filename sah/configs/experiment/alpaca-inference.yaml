    dataset_path: tatsu-lab/alpaca
    dataset_name: default

trainer:
  enable_checkpointing: false
  limit_val_batches: 0
  max_epochs: 1
  callbacks:
    model_checkpoint: null

name: alpaca
ckpt_path: last
