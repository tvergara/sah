# @package _global_

defaults:
  - override /algorithm: compressed_finetune_on_meta_math
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: false
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  accumulate_grad_batches: 1
  precision: "bf16-mixed"
  callbacks:
    model_checkpoint: null
    throughput: null
  strategy: auto
  devices: 1

name: compressed-finetune-on-meta-math
ckpt_path: last
