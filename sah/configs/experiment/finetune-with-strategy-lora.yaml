# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: lora

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 120

algorithm:
  batch_size: 6
  experiment_name: lora
  strategy:
    r: 1
    lr: 1e-4
