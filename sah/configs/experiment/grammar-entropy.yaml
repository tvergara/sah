# @package _global_

defaults:
  - override /algorithm: estimate_entropy
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: false
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 5
  callbacks:
    model_checkpoint: null

algorithm:
  general_config:
    result_file: ${hydra:runtime.output_dir}/grammar-entropies.csv
  activations_config:
    mask_included: true
    base_path: /network/scratch/b/brownet/synthetic-data/activations/subgrammar
    layers: [3]
    output_dir: step_01100

name: grammar-entropy
ckpt_path: last
