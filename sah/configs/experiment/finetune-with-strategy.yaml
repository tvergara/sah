# @package _global_

defaults:
  - override /algorithm: finetune_with_strategy
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  accumulate_grad_batches: 1
  precision: "bf16-mixed"
  callbacks:
    model_checkpoint:
      save_top_k: -1
      save_last: false
      every_n_train_steps: 400
      filename: last
    throughput: null
  strategy: auto

name: finetune-with-strategy
