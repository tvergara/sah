# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: compressed

trainer:
  callbacks:
    model_checkpoint:
      filename: llama-compressed-inf-4
  devices: 1

algorithm:
  batch_size: 4
  experiment_name: llama-compressed-inf-4
  strategy:
    compress_batches_every: 400000
    grad_accumulation_steps: 1
    scale_lr: 1e-5
    lr: 0
