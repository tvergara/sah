# @package _global_

defaults:
  - override /algorithm: distil_pretrained_model
  - override /trainer: distillation

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  callbacks:
    model_checkpoint:
      every_n_train_steps: 100
      filename: "model_weights"
      save_top_k: -1
      save_last: True

name: distil-pretrained
ckpt_path: last
