# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: blora
  - override /algorithm/model: smollm

trainer:
  enable_checkpointing: false
  max_epochs: 1
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 1.0


algorithm:
  experiment_name: blora
  strategy:
    r: 1
    prune_rank: False
