# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: blora
  - override /algorithm/model: smollm

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 300


algorithm:
  experiment_name: blora
  strategy:
    r: 128
    prune_rank: True
  #   lr: 1e-4
