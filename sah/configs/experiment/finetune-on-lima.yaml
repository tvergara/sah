# @package _global_

defaults:
  - override /algorithm: finetune_on_lima
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 10
  accumulate_grad_batches: 4
  precision: "bf16-mixed"
  callbacks:
    model_checkpoint:
      save_top_k: 0
      save_last: true
    throughput: null

name: finetune-on-lima
ckpt_path: last
