# @package _global_

defaults:
  - override /algorithm: compute_mask
  - override /trainer/callbacks: default

trainer:
  enable_checkpointing: true
  limit_val_batches: 0.0
  val_check_interval: 0
  max_epochs: 1
  callbacks:
    model_checkpoint:
      every_n_train_steps: 100
      filename: "distilled_step_{step:05d}"
      save_top_k: -1
      save_last: False

name: compute-mask
