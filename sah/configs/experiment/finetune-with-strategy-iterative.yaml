# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: iterative

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
  max_epochs: 10
  # accumulate_grad_batches: 1

algorithm:
  batch_size: 6
  experiment_name: llama-iterative
  strategy:
    lr: 1e-6
    grads_in_memory: 6
    in_context_examples: 1
    merge_grads_every: 1
    default_lr: 1e-5
