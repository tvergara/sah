# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: iterative

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
  max_epochs: 10
  strategy:
    _target_: lightning.pytorch.strategies.FSDPStrategy
    sharding_strategy: FULL_SHARD

algorithm:
  batch_size: 1
  experiment_name: llama-iterative
  strategy:
    lr: 4e-5
    grads_in_memory: 1
