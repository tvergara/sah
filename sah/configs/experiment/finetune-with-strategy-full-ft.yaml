# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: full_ft

trainer:
  enable_checkpointing: false
  max_epochs: 4
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 1.0
  strategy:
    _target_: lightning.pytorch.strategies.FSDPStrategy
    auto_wrap_policy:
      _target_: sah.algorithms.utils.fsdp_policies.get_transformer_layer_wrap_policy

algorithm:
  experiment_name: full_ft
