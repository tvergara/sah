# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: online_coding

trainer:
  enable_checkpointing: false
  max_epochs: 3
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 1.0

algorithm:
  max_examples: 64
  experiment_name: online_coding
