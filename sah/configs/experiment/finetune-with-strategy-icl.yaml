# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: icl

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
    gpu_memory_tracker: null
    early_stopping: null
  val_check_interval: 1
  limit_val_batches: 16

algorithm:
  batch_size: 1
  experiment_name: icl
  max_length: 800
  val_batch_size: 16
