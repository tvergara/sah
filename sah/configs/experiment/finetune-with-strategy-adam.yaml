# @package _global_

defaults:
  - finetune-with-strategy
  - override /algorithm/strategy: adam

trainer:
  enable_checkpointing: false
  callbacks:
    model_checkpoint: null
    early_stopping: null
  val_check_interval: 20
  limit_val_batches: 2


algorithm:
  batch_size: 2
  experiment_name: adam
  strategy:
    lr: 1e-5
