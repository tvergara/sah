defaults:
  - model_checkpoint.yaml
  - early_stopping.yaml
  - model_summary.yaml
  - rich_progress_bar.yaml
  - _self_


model_checkpoint:
  verbose: True
  dirpath: "${hydra:runtime.output_dir}/checkpoints"
  filename: "epoch_{epoch:03d}_step_{step:05d}"
  auto_insert_metric_name: False


early_stopping:
  monitor: "val/loss"
  patience: 5  # Stop training if accuracy doesn't improve for `patience` epochs.
  mode: "min"

model_summary:
  max_depth: 2

lr_monitor:
  _target_: lightning.pytorch.callbacks.LearningRateMonitor

device_utilisation:
  _target_: lightning.pytorch.callbacks.DeviceStatsMonitor
throughput:
  _target_: sah.algorithms.callbacks.samples_per_second.MeasureSamplesPerSecondCallback
