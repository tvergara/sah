_target_: sah.algorithms.finetune_with_strategy.FinetuneWithStrategy
tokenizer_config:
  _target_: sah.algorithms.utils.data_classes.TokenizerConfig
  _recursive_: false
  _convert_: object
  pretrained_model_name_or_path: ${..model_config.pretrained_model_name_or_path}
  use_fast: true
  trust_remote_code: true
model_config:
  _target_: sah.algorithms.utils.data_classes.NetworkConfig
  _recursive_: false
  _convert_: object
  pretrained_model_name_or_path: Qwen/Qwen2.5-1.5B
strategy:
  _target_: sah.algorithms.strategies.compressed_finetune.CompressedFinetuneStrategy
  _recursive_: false
  _convert_: object
  lr: 1e-5
  grad_accumulation_steps: 3
  compress_batches_every: 3
  scale_lr: 1e-5
