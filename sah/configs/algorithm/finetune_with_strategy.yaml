_target_: sah.algorithms.finetune_with_strategy.FinetuneWithStrategy
tokenizer_config:
  _target_: sah.algorithms.utils.data_classes.TokenizerConfig
  _recursive_: false
  _convert_: object
  pretrained_model_name_or_path: ${..model_config.pretrained_model_name_or_path}
  use_fast: true
  trust_remote_code: true
model_config:
  _target_: sah.algorithms.utils.data_classes.NetworkConfig
  _recursive_: false
  _convert_: object
  pretrained_model_name_or_path: meta-llama/Llama-3.2-3B
  # pretrained_model_name_or_path: Qwen/Qwen2.5-1.5B
  torch_dtype: bfloat16
defaults:
  - strategy: iterative
dataset_name: meta-math/MetaMathQA
max_examples: null
batch_size: 1
result_file: ${hydra:runtime.output_dir}/results.csv
experiment_name: default_name
